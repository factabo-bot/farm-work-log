<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>依頼をつくる</title>
<link rel="stylesheet" href="styles.css?v=20260612e">
</head>
<body>
<header>
  <h1>📣 依頼をつくる</h1>
  <nav class="mode-nav">
    <a href="index.html">📝 記録</a>
    <a href="board.html">📊 進捗</a>
    <a href="shiji.html" class="current">📣 依頼</a>
  </nav>
</header>

<main>
  <section>
    <h2>冒頭の全体コメント（任意）</h2>
    <textarea id="comment" placeholder="例: おはようございます。今日は気温が上がるので休憩はこまめに。"></textarea>
  </section>

  <section>
    <h2>① 宛先を選ぶ（複数えらべます）</h2>
    <div id="staff-buttons" class="btn-row"></div>
    <div class="manual-add">
      <input id="manual-name" placeholder="名前を手入力で追加">
      <button id="manual-add-btn" class="btn" type="button">追加</button>
    </div>
  </section>

  <section>
    <h2>② 拠点・棟</h2>
    <div id="base-buttons" class="btn-row"></div>
    <div id="building-buttons" class="btn-row" style="margin-top:8px"></div>
    <div id="status-summary" class="status-summary"></div>
    <p class="hint">数字＝その作業を最後にやってから何日たったか（棟全体）。タップで作業を選択</p>
  </section>

  <section>
    <h2>③ 作業</h2>
    <div id="work-buttons" class="btn-row"></div>
    <textarea id="work-detail" placeholder="作業内容を記入" hidden></textarea>
  </section>

  <section>
    <h2>④ 場所（任意）— 直近の作業状況マップ</h2>
    <div id="grid-area"></div>
    <p class="hint">作業を選ぶ前＝各列に作業別の経過日数（例:「収0 誘5 葉3」）。
    ③で作業を選ぶと色が付きます。数字＝最後にやってから何日たったか
    （青＝最近 → 赤＝7日以上 or 直近に記録なし）。
    場所を指定しなければ「場所おまかせ」の依頼になります</p>
  </section>

  <section>
    <button id="add-task" class="btn-secondary" type="button">＋ 依頼リストに追加</button>
    <div id="block-list"></div>
    <p class="hint">同じ人に複数追加すると ①②… の優先順になります（できるところまで方式）</p>
  </section>

  <section>
    <button id="preview-btn" class="btn-primary" type="button">プレビューを見る</button>
    <pre id="preview" class="preview" hidden></pre>
    <button id="send-btn" class="btn-primary" type="button" hidden>📲 LINEに送信</button>
    <button id="copy-btn" class="btn-secondary" type="button" hidden>📋 文面をコピー</button>
    <button id="save-btn" class="btn-secondary" type="button" hidden>シートに保存のみ</button>
  </section>
</main>

<div id="toast" hidden></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="config.js?v=20260612e"></script>
<script src="masters.js?v=20260612e"></script>
<script src="shiji.js?v=20260612e"></script>
</body>
</html>
