<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>進捗ボード</title>
<link rel="stylesheet" href="styles.css?v=20260613b">
</head>
<body>
<header>
  <h1>📊 進捗ボード</h1>
  <nav class="mode-nav">
    <a href="index.html">📝 記録</a>
    <a href="board.html" class="current">📊 進捗</a>
    <a href="shiji.html">📣 依頼</a>
  </nav>
</header>

<main>
  <section>
    <div id="mode-buttons" class="btn-row"></div>
  </section>

  <section id="date-nav-sec">
    <div class="date-nav">
      <button id="prev-day" class="btn" type="button">◀ 前日</button>
      <input type="date" id="date-input">
      <button id="next-day" class="btn" type="button">翌日 ▶</button>
    </div>
  </section>

  <section>
    <h2>拠点</h2>
    <div id="base-buttons" class="btn-row"></div>
  </section>

  <section>
    <h2>棟</h2>
    <div id="building-buttons" class="btn-row"></div>
  </section>

  <section>
    <h2 id="work-filter-title">作業でしぼる</h2>
    <div id="work-filter" class="btn-row"></div>
  </section>

  <section>
    <h2>配置図 <span id="grid-loading" class="loading-inline"></span></h2>
    <div id="grid-area"></div>
    <p class="hint" id="grid-hint"></p>
  </section>

  <section id="list-sec">
    <h2 id="list-title">記録一覧</h2>
    <div id="record-list"></div>
  </section>
</main>

<script src="config.js?v=20260613b"></script>
<script src="masters.js?v=20260613b"></script>
<script src="board.js?v=20260613b"></script>
</body>
</html>
